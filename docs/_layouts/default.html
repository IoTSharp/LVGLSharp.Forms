<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'zh-CN' }}">
  {% include site-head.html %}
  <body class="site-shell">
    <div class="site-backdrop" aria-hidden="true"></div>
    {% include site-header.html %}

    <main class="site-main">
      <div class="container">
        {% if page.template == 'structured' %}
          {% include structured-page.html %}
        {% else %}
          <article class="doc-article">
            {% include article-language-switch.html %}
            {{ content }}
          </article>
        {% endif %}
      </div>
    </main>

    {% include site-footer.html %}
  </body>
</html>
