name: Pack NuGet Packages

'on':
  workflow_call:
    inputs:
      package_version:
        description: Package version used when creating NuGet packages
        required: true
        type: string

jobs:
  pack:
    name: Create NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native_artifacts

      - name: Reset runtime layout
        shell: bash
        run: |
          rm -rf src/LVGLSharp.Native/runtimes
          mkdir -p src/LVGLSharp.Native/runtimes

      - name: Arrange native assets under runtimes
        shell: bash
        run: |
          declare -A LIB_NAME=(
            [win-x64]="lvgl.dll"
            [win-x86]="lvgl.dll"
            [win-arm64]="lvgl.dll"
            [linux-x64]="liblvgl.so"
            [linux-arm]="liblvgl.so"
            [linux-arm64]="liblvgl.so"
            [osx-arm64]="liblvgl.dylib"
            [osx-x64]="liblvgl.dylib"
          )

          missing=()
          for rid in "${!LIB_NAME[@]}"; do
            src_dir="native_artifacts/native-${rid}"
            dst_dir="src/LVGLSharp.Native/runtimes/${rid}/native"
            mkdir -p "$dst_dir"
            lib="${LIB_NAME[$rid]}"
            placed=false

            if [ -f "${src_dir}/${lib}" ]; then
              cp "${src_dir}/${lib}" "${dst_dir}/"
              echo "Placed ${lib} -> ${dst_dir}/"
              placed=true
            else
              first=$(find "$src_dir" \( -name "*.dll" -o -name "*.so" -o -name "*.dylib" \) | head -1)
              if [ -n "$first" ]; then
                cp "$first" "${dst_dir}/${lib}"
                echo "Placed fallback $(basename "$first") -> ${dst_dir}/${lib}"
                placed=true
              fi
            fi

            if [ "$placed" = "false" ]; then
              echo "Error: no native library found for ${rid} in ${src_dir}"
              missing+=("$rid")
            fi
          done

          if [ ${#missing[@]} -ne 0 ]; then
            echo "Missing native outputs for: ${missing[*]}"
            exit 1
          fi

          echo "Native assets prepared for packing:"
          find src/LVGLSharp.Native/runtimes -type f | sort

      - name: Pack LVGLSharp.Native
        run: |
          dotnet pack src/LVGLSharp.Native/LVGLSharp.Native.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            --output nupkgs

      - name: Register local NuGet feed
        run: dotnet nuget add source "$(pwd)/nupkgs" --name local-packages

      - name: Pack LVGLSharp.Interop
        run: |
          dotnet pack src/LVGLSharp.Interop/LVGLSharp.Interop.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Core
        run: |
          dotnet pack src/LVGLSharp.Core/LVGLSharp.Core.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Runtime.Windows
        run: |
          dotnet pack src/LVGLSharp.Runtime.Windows/LVGLSharp.Runtime.Windows.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Runtime.Linux
        run: |
          dotnet pack src/LVGLSharp.Runtime.Linux/LVGLSharp.Runtime.Linux.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Runtime.Headless
        run: |
          dotnet pack src/LVGLSharp.Runtime.Headless/LVGLSharp.Runtime.Headless.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Runtime.MacOs
        run: |
          dotnet pack src/LVGLSharp.Runtime.MacOs/LVGLSharp.Runtime.MacOs.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Runtime.Remote
        run: |
          dotnet pack src/LVGLSharp.Runtime.Remote/LVGLSharp.Runtime.Remote.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Pack LVGLSharp.Forms
        run: |
          dotnet pack src/LVGLSharp.WinForms/LVGLSharp.Forms.csproj \
            -c Release \
            -p:Version=${{ inputs.package_version }} \
            -p:LVGLSharpNativePackageVersion=${{ inputs.package_version }} \
            --output nupkgs

      - name: Upload NuGet packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg
