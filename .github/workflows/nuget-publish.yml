name: 打包并发布 NuGet 包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "包版本号（如 9.3.0.4 或 v9.3.0.4）"
        required: true
        default: "9.3.0.4"
      publish_nuget:
        description: "发布到 NuGet.org"
        type: boolean
        default: true
      publish_github:
        description: "发布到 GitHub Packages"
        type: boolean
        default: true

env:
  # 版本来源：优先使用 workflow_dispatch 输入，其次使用 tag 名称。
  # 注意：tag/输入值可能含有 'v' 前缀（如 v9.3.0.4），会在 prepare 步骤中去除。
  PACKAGE_VERSION: ${{ github.event.inputs.version || github.ref_name }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      package_version: ${{ steps.ver.outputs.version }}
      release_tag: ${{ steps.ver.outputs.tag }}

    steps:
      - name: 规范化并校验版本号
        id: ver
        shell: bash
        run: |
          RAW_TAG=""
          RAW_VERSION="${{ env.PACKAGE_VERSION }}"

          if [ -z "$RAW_VERSION" ]; then
            echo "错误：未提供版本号。"
            exit 1
          fi

          VERSION="${RAW_VERSION#v}"
          # 按仓库当前 tag 约定，仅支持 4 段数字版本号，例如 9.3.0.4。
          if [[ ! "$VERSION" =~ ^[0-9]+(\.[0-9]+){3}$ ]]; then
            echo "错误：版本号 '$RAW_VERSION' 不符合要求，必须为四段版本号，如 v9.3.0.4 或 9.3.0.4。"
            exit 1
          fi

          if [[ "${GITHUB_REF}" =~ ^refs/tags/ ]]; then
            RAW_TAG="${GITHUB_REF_NAME}"
          fi

          if [ -z "$RAW_TAG" ]; then
            RAW_TAG="v$VERSION"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${RAW_TAG}" >> "$GITHUB_OUTPUT"
          echo "使用版本号：${VERSION}"
          echo "发布标签：${RAW_TAG}"

  # ──────────────────────────────────────────────────────────────────────────
  # 1. 为各平台构建原生库
  # ──────────────────────────────────────────────────────────────────────────
  build-native:
    needs: prepare
    uses: ./.github/workflows/build-native.yml
    permissions:
      contents: read

  # ──────────────────────────────────────────────────────────────────────────
  # 2. 组装原生包、共享托管包、平台运行时包与 Forms 包
  # ──────────────────────────────────────────────────────────────────────────
  pack:
    needs: [prepare, build-native]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: false   # 仅托管代码，无需构建 C 库

      # ── 下载所有原生库制品 ────────────────────────────────────────────────
      - name: 下载所有原生库制品
        uses: actions/download-artifact@v4
        with:
          pattern: native-*
          path: native_artifacts

      - name: 清理占位 runtimes 目录
        shell: bash
        run: |
          rm -rf src/LVGLSharp.Native/runtimes
          mkdir -p src/LVGLSharp.Native/runtimes

      # ── 按 runtimes/{rid}/native/ 结构组织原生库 ──────────────────────────
      - name: 整理原生库到 runtimes 目录结构
        shell: bash
        run: |
          declare -A LIB_NAME=(
            [win-x64]="lvgl.dll"
            [win-x86]="lvgl.dll"
            [win-arm64]="lvgl.dll"
            [linux-x64]="liblvgl.so"
            [linux-arm]="liblvgl.so"
            [linux-arm64]="liblvgl.so"
          )
          missing=()
          for rid in "${!LIB_NAME[@]}"; do
            src_dir="native_artifacts/native-${rid}"
            dst_dir="src/LVGLSharp.Native/runtimes/${rid}/native"
            mkdir -p "$dst_dir"
            lib="${LIB_NAME[$rid]}"
            placed=false
            if [ -f "${src_dir}/${lib}" ]; then
              cp "${src_dir}/${lib}" "${dst_dir}/"
              echo "已放置 ${lib} -> ${dst_dir}/"
              placed=true
            else
              # 回退：查找制品目录中的第一个 .so 或 .dll
              first=$(find "$src_dir" \( -name "*.dll" -o -name "*.so" \) | head -1)
              if [ -n "$first" ]; then
                cp "$first" "${dst_dir}/${lib}"
                echo "已放置（回退）$(basename "$first") -> ${dst_dir}/${lib}"
                placed=true
              fi
            fi
            if [ "$placed" = "false" ]; then
              echo "错误：在 ${src_dir} 中找不到 ${rid} 的原生库"
              missing+=("$rid")
            fi
          done
          if [ ${#missing[@]} -ne 0 ]; then
            echo "以下 RID 缺少原生库：${missing[*]}"
            exit 1
          fi
          echo "当前将用于打包的原生库："
          find src/LVGLSharp.Native/runtimes -type f | sort

      # ── 打包 LVGLSharp.Native ─────────────────────────────────────────────
      - name: 打包 LVGLSharp.Native
        run: |
          dotnet pack src/LVGLSharp.Native/LVGLSharp.Native.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.package_version }} \
            --output nupkgs

      # ── 注册本地 NuGet 源，供依赖 LVGLSharp.Native 的包在 CI 中解析本地产物 ───
      # CI 环境中 $(CI)==true 会激活 LVGLSharp.Native 包引用，
      # 此时该包尚未发布到 NuGet.org，需要指向本地 nupkgs/ 目录。
      - name: 注册本地 NuGet 源
        run: dotnet nuget add source "$(pwd)/nupkgs" --name local-packages

      # ── 打包 LVGLSharp.Interop（依赖 LVGLSharp.Native） ───────────────────
      - name: 打包 LVGLSharp.Interop
        run: |
          dotnet pack src/LVGLSharp.Interop/LVGLSharp.Interop.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.package_version }} \
            --output nupkgs

      # ── 打包 LVGLSharp.Core（Forms 与平台运行时共享依赖） ─────────────────
      - name: 打包 LVGLSharp.Core
        run: |
          dotnet pack src/LVGLSharp.Core/LVGLSharp.Core.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.package_version }} \
            --output nupkgs

      # ── 打包 LVGLSharp.Runtime.Windows（Windows 平台运行时） ───────────────
      - name: 打包 LVGLSharp.Runtime.Windows
        run: |
          dotnet pack src/LVGLSharp.Windows/LVGLSharp.Runtime.Windows.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.package_version }} \
            --output nupkgs

      # ── 打包 LVGLSharp.Runtime.Linux（Linux 平台运行时） ──────────────────
      - name: 打包 LVGLSharp.Runtime.Linux
        run: |
          dotnet pack src/LVGLSharp.Runtime.Linux/LVGLSharp.Runtime.Linux.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.package_version }} \
            --output nupkgs

      # ── 打包 LVGLSharp.Forms（平台无关；由运行时包自动注册宿主） ──────────
      - name: 打包 LVGLSharp.Forms
        run: |
          dotnet pack src/LVGLSharp.WinForms/LVGLSharp.Forms.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.package_version }} \
            --output nupkgs

      # ── 将打包好的 NuGet 包上传为制品 ────────────────────────────────────
      - name: 上传 NuGet 包制品
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs/*.nupkg

  # ──────────────────────────────────────────────────────────────────────────
  # 3. 发布
  # ──────────────────────────────────────────────────────────────────────────
  publish:
    needs: [prepare, pack]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    # 仅在 tag 发布或手动触发需要发布时执行
    if: |
      startsWith(github.ref, 'refs/tags/') ||
      github.event.inputs.publish_nuget == 'true' ||
      github.event.inputs.publish_github == 'true'

    steps:
      - name: 下载 NuGet 包制品
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.release_tag }}
        run: |
          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}"
          http_status=$(curl -sS -o /tmp/release_lookup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          if [ "$http_status" = "200" ]; then
            gh release upload "$RELEASE_TAG" nupkgs/*.nupkg --clobber
          elif [ "$http_status" = "404" ]; then
            gh release create "$RELEASE_TAG" nupkgs/*.nupkg \
              --title "$RELEASE_TAG" \
              --generate-notes
          else
            echo "查询 GitHub Release 失败，HTTP 状态码：$http_status（请检查令牌权限、API 限流或网络连接）。"
            cat /tmp/release_lookup.json
            exit 1
          fi

      # ── 发布到 NuGet.org ──────────────────────────────────────────────────
      - name: 发布到 NuGet.org
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          github.event.inputs.publish_nuget == 'true'
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate \
            --timeout 600

      # ── 发布到 GitHub Packages ────────────────────────────────────────────
      - name: 发布到 GitHub Packages
        if: |
          startsWith(github.ref, 'refs/tags/') ||
          github.event.inputs.publish_github == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text
          dotnet nuget push nupkgs/*.nupkg \
            --source github \
            --api-key "$GITHUB_TOKEN" \
            --skip-duplicate \
            --timeout 600
