name: 发布 NuGet 与 Release 资产

'on':
  workflow_call:
    # inputs: 接收发布标签与发布目标开关，执行 Release / NuGet / GitHub Packages 发布。
    inputs:
      release_tag:
        description: "发布标签：通常为 v9.5.0.5 形式"
        required: true
        type: string
      publish_nuget:
        description: "是否发布到 NuGet.org"
        required: true
        type: boolean
      publish_github:
        description: "是否发布到 GitHub Packages"
        required: true
        type: boolean
    # outputs: 当前工作流只执行发布动作，不向调用方返回结构化 outputs。

jobs:
  publish:
    name: 发布 Release 资产
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 安装 .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: 下载 NuGet 包制品
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: nupkgs

      - name: 下载 demo 发布包制品
        uses: actions/download-artifact@v4
        with:
          pattern: demo-release-*
          path: demo_assets
          merge-multiple: true

      - name: 汇总 Release 资产
        shell: bash
        run: |
          mkdir -p release_assets
          cp nupkgs/*.nupkg release_assets/
          find demo_assets -maxdepth 1 -type f -exec cp {} release_assets/ \;
          ls -lh release_assets

      - name: 发布到 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${RELEASE_TAG}"
          http_status=$(curl -sS -o /tmp/release_lookup.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "$api_url")

          if [ "$http_status" = "200" ]; then
            gh release upload "$RELEASE_TAG" release_assets/* \
              --repo "${{ github.repository }}" \
              --clobber
          elif [ "$http_status" = "404" ]; then
            gh release create "$RELEASE_TAG" release_assets/* \
              --repo "${{ github.repository }}" \
              --title "$RELEASE_TAG" \
              --generate-notes
          else
            echo "查询 GitHub Release 失败，HTTP 状态码：$http_status（请检查令牌权限、API 限流或网络连接）。"
            cat /tmp/release_lookup.json
            exit 1
          fi

      - name: 发布到 NuGet.org
        if: ${{ inputs.publish_nuget }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push nupkgs/*.nupkg \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate \
            --timeout 600

      - name: 发布到 GitHub Packages
        if: ${{ inputs.publish_github }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          dotnet nuget add source \
            "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
            --name github \
            --username "${{ github.actor }}" \
            --password "$GITHUB_TOKEN" \
            --store-password-in-clear-text
          dotnet nuget push nupkgs/*.nupkg \
            --source github \
            --api-key "$GITHUB_TOKEN" \
            --skip-duplicate \
            --timeout 600